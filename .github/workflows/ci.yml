name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Validate skills
        run: bun run validate

      - name: Check generated files are up-to-date
        run: bun run build:from-skills:check

      - name: Test
        run: bun test

  session-start-profiler-cross-platform:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build hooks
        run: bun run build:hooks

      - name: Test linked project telemetry coverage
        run: bun test tests/session-start-profiler.test.ts -t "session-start telemetry helpers|uses the hook payload root for linked project telemetry"

      - name: Test session hook platform compatibility
        run: bun test hooks/session-hooks-platform-compat.test.ts
